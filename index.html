<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing & Spam Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Reset & Base Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1a1c24 0%, #0f1015 100%);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Container Card */
        .app-container {
            background: rgba(30, 33, 45, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            width: 100%;
            max-width: 650px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header .subtitle {
            font-size: 0.95rem;
            color: #9ca3af;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Interactive Form Layout */
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }

        form textarea {
            background: rgba(15, 16, 21, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 16px;
            color: #ffffff;
            font-size: 1rem;
            resize: none;
            height: 140px;
            transition: all 0.3s ease;
        }

        form textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        form button {
            background: #3b82f6;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        form button:hover {
            background: #2563eb;
        }

        /* Conditional Evaluation Alert Cards */
        .result-card {
            margin-top: 30px;
            padding: 24px;
            border-radius: 10px;
            display: none; /* Hidden by default */
        }

        .result-card h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Success Card Style */
        .result-card.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            display: block;
        }

        /* Phishing Threat Style */
        .result-card.danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            display: block;
        }

        .keyword-box {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(239, 68, 68, 0.2);
            color: #f3f4f6;
        }

        .keyword-box p {
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .keyword-box ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .keyword-box li {
            background: rgba(239, 68, 68, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fca5a5;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>SMS Spam & Phishing Detector</h1>
            <p class="subtitle">Enter any message below to screen it with our hybrid intelligence security filter.</p>
        </header>

        <main>
            <form id="spamForm" onsubmit="analyzeMessage(event)">
                <label for="message">Analyze Incoming Message</label>
                <textarea 
                    id="message" 
                    placeholder="Paste email context, banking alerts, or text messages here..." 
                    required></textarea>
                
                <button type="submit">Scan Message</button>
            </form>

            <div id="resultCard" class="result-card">
                <h2 id="resultTitle"></h2>
                <div id="keywordBox" class="keyword-box" style="display: none;">
                    <p><strong>Triggered Suspicious Keywords:</strong></p>
                    <ul id="keywordList"></ul>
                </div>
            </div>
        </main>
    </div>

    <script>
        function analyzeMessage(event) {
            event.preventDefault();
            
            const message = document.getElementById('message').value;
            const resultCard = document.getElementById('resultCard');
            const resultTitle = document.getElementById('resultTitle');
            const keywordBox = document.getElementById('keywordBox');
            const keywordList = document.getElementById('keywordList');
            
            // Clear previous states
            keywordList.innerHTML = '';
            keywordBox.style.display = 'none';
            resultCard.className = 'result-card';
            
            const phishingKeywords = [
                "bank", "verify", "otp", "click", "urgent", "login", 
                "password", "account", "suspended", "winner", "prize", 
                "lottery", "free", "claim", "cashback", "income", "update", 
                "verification", "block", "identity", "won", "security", 
                "alert", "terminated", "compromised"
            ];

            const cleanMessage = message.lower ? message.lower() : message.toLowerCase();
            let detectedWords = [];

            // Core Heuristics Verification
            phishingKeywords.forEach(word => {
                if (cleanMessage.includes(word)) {
                    detectedWords.push(word);
                }
            });

            // Fallback heuristics to catch standard numeric/spam shortcodes
            const hasSpamPatterns = (cleanMessage.match(/\b\d{5,6}\b/g) || []).length > 0;

            if (detectedWords.length > 0 || hasSpamPatterns) {
                resultTitle.innerText = "⚠️ SPAM / PHISHING DETECTED";
                resultCard.classList.add('danger');
                
                if (detectedWords.length > 0) {
                    keywordBox.style.display = 'block';
                    detectedWords.forEach(word => {
                        const li = document.createElement('li');
                        li.innerText = `• ${word}`;
                        keywordList.appendChild(li);
                    });
                }
            } else {
                resultTitle.innerText = "✅ THIS MESSAGE IS SAFE";
                resultCard.classList.add('success');
            }
        }
    </script>
</body>
</html>
